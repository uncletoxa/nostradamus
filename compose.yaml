services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_nostr
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init/01_create_user.sql:/docker-entrypoint-initdb.d/01_create_user.sql:ro
      - ./db_nostr_backup_20260606_141300.sql.gz:/docker-entrypoint-initdb.d/02_restore.sql.gz:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U u_nostr -d db_nostr"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Containerfile
    env_file: .env
    ports:
      - "127.0.0.1:8018:8000"
    depends_on:
      - db

volumes:
  db_data:
