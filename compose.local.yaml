services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - local_db_data:/var/lib/postgresql/data
      - ./docker/local-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5433:5432"

  web:
    build:
      context: .
      dockerfile: Containerfile
    env_file: .env.local
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  local_db_data:
