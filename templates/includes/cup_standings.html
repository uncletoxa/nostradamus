<table class="table">
  <thead class="thead-dark">
    <tr>
      <th>User</th>
      <th>Total Points</th>
      {% if long_standings %}
        <th>Result Bet</th>
        <th>Score Bet</th>
        <th>Winner Points</th>
      {% endif %}
    </tr>
  </thead>
  <tbody>
    {% for user, points in results.items %}
      <tr>
        <td><a href="{% url 'results:user_results' user.id %}">{{ user.first_name }}</a></td>
        <td>{{ points.total_points }}</td>
        {% if long_standings %}
          <td>{{ points.result_bet }}</td>
          <td>{{ points.score_bet }}</td>
          <td>{{ points.winner_points }}</td>
      {% endif %}
      </tr>
    {% endfor %}
  </tbody>
</table>
