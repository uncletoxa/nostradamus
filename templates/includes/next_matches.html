{% load i18n %}
<table class="table">
  <thead class="table-dark">
    <tr>
      <th>{% trans "Match" %}</th>
      <th>{% trans "Start Time" %}</th>
      <th>{% trans "Your Prediction" %}</th>
    </tr>
  </thead>
  <tbody>
    {% for match, prediction in predictions.items %}
      <tr>
        <td><a href="{% url 'matches:single_match' match.match_id %}">{{ match }}</a></td>
        <td>{{ match.start_time|date:"d-m-Y H:i" }}</td>
        {% if prediction %}
          <td><a href="{% url 'predictions:details' match.match_id %}">{{ prediction.score }}</a></td>
        {% else %}
          <td><a href="{% url 'predictions:details' match.match_id %}" class="btn btn-primary">{% trans "Make prediction" %}</a></td>
        {% endif %}
      </tr>
    {% endfor %}
  </tbody>
</table>
