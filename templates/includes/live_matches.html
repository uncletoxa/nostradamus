{% load i18n %}
{% if live_matches %}
  <span class="badge badge-danger">{% trans "Live Results" %}</span>
    <div class="row">
      {% for live_match in live_matches %}
        <div class="col-12 col-md-6 mb-2">
          <div class="card h-100">
            <div class="card-header"><a href="{% url 'matches:single_match' live_match.match_id %}">{{ live_match }}</a></div>
            <div class="card-body">
              <h3 class="card-title">{{ live_match.result }}</h3>
              <p class="text-muted mb-0">{% trans "start time:" %} {{ live_match.start_time|date:"d-m-Y H:i" }}</p>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
{% endif %}
