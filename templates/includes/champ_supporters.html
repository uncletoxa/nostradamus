{% load i18n %}
<table class="table table-hover">
  <thead class="table-dark">
    <tr>
      <th>{% trans "User" %}</th>
      <th>{% trans "Supported Team" %}</th>
    </tr>
  </thead>
  <tbody>
    {% for supporter in team_champ_supporters %}
      <tr>
        <td><a href="{% url 'results:user_results' supporter.user_id.id %}">{{ supporter.user_id.first_name }}</a></td>
        {% if submissions_closed %}
          <td>{{ supporter.team_id }}</td>
        {% else %}
          <td class="text-muted">{% trans "Hidden until deadline" %}</td>
        {% endif %}
      </tr>
    {% endfor %}
  </tbody>
</table>
