{% extends 'base.html' %}
{% load i18n %}

{% block title %}{{ post.title }}{% endblock %}


{% block content %}
  <h3 class="mb-3">{{ post.title }}</h3>
  <p class="text-muted"><small>{{ post.created_at|date:"j F Y" }}</small></p>
  {% if post.photo %}
    <img src="{{ post.photo.url }}" class="img-fluid rounded mb-3" alt="{{ post.title }}" style="max-height: 400px; object-fit: cover;">
  {% endif %}
  <div>{{ post.body|linebreaks }}</div>
{% endblock %}
