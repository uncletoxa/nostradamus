{% extends 'base_accounts.html' %}
{% load i18n %}

{% block title %}{% trans "Log in to Nostradamus Cup" %}{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-4 col-md-6 col-sm-8">
      <div class="card">
        <div class="card-body">
          <h3 class="card-title">{% trans "Log in" %}</h3>
          <form method="post" novalidate>
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            {% include 'includes/form.html' %}
            <button type="submit" class="btn btn-primary w-100">{% trans "Log in" %}</button>
          </form>
        </div>
        <div class="card-footer text-muted text-center">
          {% trans "New to Nostradamus Cup?" %} <a href="{% url 'signup' %}">{% trans "Sign up" %}</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
